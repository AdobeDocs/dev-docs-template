---
    name: Build Site Metadata
    on:
      pull_request:
        branches: [main]
        paths:
          - 'src/pages/**'
    
    jobs:
      build-site-metadata:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout
            uses: actions/checkout@v4
    
          - name: Build Site Metadata
            run: npx --yes github:AdobeDocs/adp-devsite-utils buildSiteMetadata -v